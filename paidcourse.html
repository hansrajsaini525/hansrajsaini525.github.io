<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Course - Raj Trader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --blue: #38bdf8;
            --pink: #f43f5e; --yellow: #ffff00; --green: #25d366;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        
        nav { background: #1e293b; padding: 15px; display: flex; justify-content: center; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: bold; }

        .container { max-width: 600px; margin: 40px auto; padding: 20px; }
        .course-box { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--blue); }
        
        .timer { font-size: 2rem; color: var(--pink); font-weight: bold; margin: 20px 0; display: none; }
        
        .qr-area { background: white; padding: 20px; border-radius: 15px; margin: 20px 0; display: none; }
        .qr-area img { width: 200px; }

        .btn { padding: 15px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; margin-top: 10px; }
        .btn-pay { background: var(--blue); color: #000; }
        .btn-download { background: var(--green); color: white; display: none; text-decoration: none; }

        .instruction { font-size: 0.9rem; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="paidcourse.html">Paid Course</a>
    <a href="about.html">About Me</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <div class="course-box">
        <i class="fas fa-file-pdf" style="font-size: 3rem; color: var(--yellow);"></i>
        <h2>Price Action Mastery PDF</h2>
        <p>Price: <span style="color: var(--yellow); font-size: 1.5rem;">₹299</span></p>

        <button id="startBtn" class="btn btn-pay" onclick="startPayment()">Pay Now to Download</button>

        <div id="paymentSection">
            <div id="timer" class="timer">05:00</div>
            
            <div id="qrBox" class="qr-area">
                <img src="qrhansraj.png.jpeg" alt="QR Code">
                <p style="color: black; font-weight: bold;">Scan & Pay ₹299</p>
                <p style="color: red; font-size: 0.8rem;">Note: Screenshot WhatsApp par zaroor bhejein!</p>
            </div>

            <a href="YOUR_GOOGLE_DRIVE_PDF_LINK_HERE" id="downloadBtn" class="btn btn-download" target="_blank">
                <i class="fas fa-download"></i> Download PDF Now
            </a>
        </div>

        <p class="instruction" id="footerNote">Payment ke baad ye page band na karein.</p>
    </div>
</div>

<script>
    let timeLeft = 300; // 5 minutes in seconds
    let timerElement = document.getElementById('timer');
    let downloadBtn = document.getElementById('downloadBtn');
    let qrBox = document.getElementById('qrBox');
    let startBtn = document.getElementById('startBtn');

    function startPayment() {
        startBtn.style.display = 'none';
        qrBox.style.display = 'block';
        timerElement.style.display = 'block';
        
        let countdown = setInterval(function() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            
            seconds = seconds < 10 ? '0' + seconds : seconds;
            timerElement.innerHTML = `${minutes}:${seconds}`;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.innerHTML = "Time Expired!";
                qrBox.style.opacity = "0.3";
                alert("Time up! Agar aapne pay kar diya hai toh WhatsApp par message karein.");
            } else {
                timeLeft--;
            }
            
            // Artificial delay: Payment confirm hone ka button 10 second baad dikhate hain
            if (timeLeft == 290) { 
                downloadBtn.style.display = 'block';
            }
        }, 1000);
    }
</script>

</body>
</html>
